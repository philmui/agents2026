<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="420" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Response relevancy: reverse-engineer the question, then compare</text><rect x="60" y="150" width="180" height="80" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="150" y="185" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#b5651d" text-anchor="middle" font-weight="bold">The answer</text><text x="150" y="208" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">the model gave</text><line x1="240" y1="190" x2="310" y2="190" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="275" y="180" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6470" text-anchor="middle" font-weight="normal">reverse</text><rect x="310" y="120" width="210" height="140" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="415" y="144" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#37474f" text-anchor="middle" font-weight="bold">LLM invents the</text><text x="415" y="160" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#37474f" text-anchor="middle" font-weight="bold">questions this answer</text><text x="415" y="188" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1f2933" text-anchor="middle" font-weight="normal" font-style="italic">"what is gold?"</text><text x="415" y="208" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1f2933" text-anchor="middle" font-weight="normal" font-style="italic">"why hold gold?"</text><text x="415" y="228" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1f2933" text-anchor="middle" font-weight="normal" font-style="italic">"gold price drivers?"</text><line x1="520" y1="190" x2="590" y2="190" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="555" y="180" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6470" text-anchor="middle" font-weight="normal">compare</text><rect x="590" y="150" width="170" height="80" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="675" y="180" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Original</text><text x="675" y="197" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">question</text><rect x="150" y="300" width="520" height="80" rx="10" fill="#ffffff" stroke="#b8860b" stroke-width="1.5"/><text x="410" y="330" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#1f2933" text-anchor="middle" font-weight="bold">Relevancy = embedding similarity(invented, original)</text><text x="410" y="360" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">rewards on-topic, NOT correct; punishes a true "I do not know"</text></svg>