<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="470" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Metrics-Driven Development: change one thing, then re-measure</text><rect x="30" y="208" width="260" height="84" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="160" y="242" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#37474f" text-anchor="middle" font-weight="bold">1. Establish baseline</text><text x="160" y="264" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">measure the current system</text><rect x="280" y="88" width="260" height="84" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="410" y="122" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#b5651d" text-anchor="middle" font-weight="bold">2. Change ONE thing</text><text x="410" y="144" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">new prompt, more context, a reranker</text><rect x="530" y="208" width="260" height="84" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="660" y="242" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#2f6f7f" text-anchor="middle" font-weight="bold">3. Recompute metrics</text><text x="660" y="264" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">same test set, same judge</text><rect x="280" y="328" width="260" height="84" rx="10" fill="#ece8f4" stroke="#5b4b8a" stroke-width="1.5"/><text x="410" y="362" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#5b4b8a" text-anchor="middle" font-weight="bold">Compare</text><text x="410" y="384" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">did it improve, and by how much?</text><path d="M 280 220 C 240 130, 290 100, 350 120" fill="none" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><path d="M 540 140 C 610 120, 660 160, 660 206" fill="none" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><path d="M 660 294 C 660 360, 560 380, 500 368" fill="none" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><path d="M 320 368 C 210 370, 160 340, 160 294" fill="none" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="410" y="250" font-family="Helvetica,Arial,sans-serif" font-size="17" fill="#b8860b" text-anchor="middle" font-weight="bold">MDD</text><text x="410" y="270" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">watch the change,</text><text x="410" y="284" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">not the absolute</text></svg>