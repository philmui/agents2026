<svg viewBox="0 0 820 430" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="430" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Factual correctness: compare answer claims to the truth</text><rect x="60" y="120" width="300" height="80" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="210" y="150" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#b5651d" text-anchor="middle" font-weight="bold">Response claims</text><text x="210" y="176" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">what the answer asserts</text><rect x="460" y="120" width="300" height="80" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="610" y="150" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Reference claims</text><text x="610" y="176" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">the ground truth</text><rect x="300" y="240" width="220" height="70" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="410" y="268" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#2e7d52" text-anchor="middle" font-weight="bold">TP: claims in both</text><text x="410" y="290" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">(true overlap)</text><rect x="70" y="240" width="200" height="70" rx="10" fill="#f6e2de" stroke="#b3402f" stroke-width="1.5"/><text x="170" y="268" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b3402f" text-anchor="middle" font-weight="bold">FP: only in response</text><text x="170" y="290" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">(made up)</text><rect x="550" y="240" width="200" height="70" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="650" y="268" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#37474f" text-anchor="middle" font-weight="bold">FN: only in reference</text><text x="650" y="290" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">(missed)</text><line x1="210" y1="200" x2="360" y2="240" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><line x1="610" y1="200" x2="460" y2="240" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="180" y="340" width="460" height="60" rx="10" fill="#ffffff" stroke="#b8860b" stroke-width="1.5"/><text x="410" y="375" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" font-weight="bold">Precision = TP/(TP+FP)   Recall = TP/(TP+FN)   F1 balances both</text></svg>