<svg viewBox="0 0 820 410" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="410" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Agent goal accuracy: judge the outcome, not the path</text><rect x="40" y="150" width="210" height="110" rx="10" fill="#ece8f4" stroke="#5b4b8a" stroke-width="1.5"/><text x="145" y="180" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b4b8a" text-anchor="middle" font-weight="bold">Conversation</text><text x="145" y="206" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">user asks, agent acts,</text><text x="145" y="224" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">tools answer, agent replies</text><line x1="250" y1="205" x2="320" y2="205" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="320" y="150" width="200" height="110" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="420" y="180" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">Judge infers</text><text x="420" y="206" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">the user's GOAL and</text><text x="420" y="224" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">the OUTCOME reached</text><line x1="520" y1="205" x2="590" y2="205" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="590" y="165" width="190" height="80" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="685" y="196" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2e7d52" text-anchor="middle" font-weight="bold">Goal met?</text><text x="685" y="222" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">1 = yes, 0 = no</text><rect x="60" y="310" width="340" height="80" rx="10" fill="#ffffff" stroke="#2f6f7f" stroke-width="1.5"/><text x="230" y="336" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#2f6f7f" text-anchor="middle" font-weight="bold">With reference</text><text x="230" y="360" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">compare end state to an ideal outcome</text><rect x="430" y="310" width="330" height="80" rx="10" fill="#ffffff" stroke="#b5651d" stroke-width="1.5"/><text x="595" y="336" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b5651d" text-anchor="middle" font-weight="bold">Without reference</text><text x="595" y="360" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">judge infers the goal from the chat</text></svg>