<svg viewBox="0 0 820 450" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="450" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Context precision and recall pull in different directions</text><circle cx="330" cy="250" r="120" fill="#e3eef0" fill-opacity="0.7" stroke="#2f6f7f" stroke-width="1.5"/><circle cx="470" cy="250" r="120" fill="#f7ebdd" fill-opacity="0.55" stroke="#b5651d" stroke-width="1.5"/><text x="270" y="180" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Retrieved</text><text x="545" y="180" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#b5651d" text-anchor="middle" font-weight="bold">Relevant</text><text x="400" y="256" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" font-weight="bold">hits</text><text x="250" y="260" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">junk</text><text x="548" y="260" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">missed</text><rect x="70" y="360" width="300" height="60" rx="10" fill="#ffffff" stroke="#2f6f7f" stroke-width="1.5"/><text x="220" y="384" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Precision = hits / Retrieved</text><text x="220" y="404" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">mostly fish, not boots?</text><rect x="440" y="360" width="