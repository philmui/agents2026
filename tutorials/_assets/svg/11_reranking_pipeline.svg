<svg viewBox="0 0 820 410" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="410" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Reranking: reorder rough vector hits by true relevance</text><rect x="30" y="160" width="120" height="80" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="90" y="200" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#37474f" text-anchor="middle" font-weight="bold">Query</text><line x1="150" y1="200" x2="200" y2="200" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="200" y="150" width="180" height="100" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="290" y="180" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Vector search</text><text x="290" y="204" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">fetch k = 10</text><text x="290" y="221" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">rough order</text><line x1="380" y1="200" x2="440" y2="200" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="410" y="191" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6470" text-anchor="middle" font-weight="normal">10</text><rect x="440" y="150" width="180" height="100" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="530" y="180" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#b5651d" text-anchor="middle" font-weight="bold">Cohere rerank</text><text x="530" y="204" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">reads query + doc</text><text x="530" y="221" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">together</text><line x1="620" y1="200" x2="680" y2="200" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="650" y="191" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6470" text-anchor="middle" font-weight="normal">top 3</text><rect x="680" y="160" width="110" height="80" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="735" y="195" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2e7d52" text-anchor="middle" font-weight="bold">Best 3</text><text x="735" y="212" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2e7d52" text-anchor="middle" font-weight="bold">passages</text><rect x="150" y="300" width="520" height="80" rx="10" fill="#ffffff" stroke="#b8860b" stroke-width="1.5"/><text x="410" y="330" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#1f2933" text-anchor="middle" font-weight="bold">Pattern: retrieve WIDE, then rerank NARROW</text><text x="410" y="360" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">better ordering puts the most useful passage in front of the model</text></svg>