<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="400" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">LLM as a judge: a different model grades the answer</text><rect x="60" y="150" width="200" height="90" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="160" y="184" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#b5651d" text-anchor="middle" font-weight="bold">Generator</text><text x="160" y="208" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">nemotron-3-super</text><line x1="260" y1="195" x2="340" y2="195" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="300" y="186" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">answer</text><rect x="340" y="150" width="160" height="90" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="420" y="190" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">Answer +</text><text x="420" y="207" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">context</text><line x1="500" y1="195" x2="580" y2="195" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="580" y="150" width="200" height="90" rx="10" fill="#ece8f4" stroke="#5b4b8a" stroke-width="1.5"/><text x="680" y="180" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b4b8a" text-anchor="middle" font-weight="bold">Judge (different!)</text><text x="680" y="204" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">gemma4:31b, temp 0</text><line x1="680" y1="240" x2="680" y2="300" stroke="#5b4b8a" stroke-width="2" marker-end="url(#arr)"/><rect x="560" y="300" width="240" height="70" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="680" y="330" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2e7d52" text-anchor="middle" font-weight="bold">score 0 to 1</text><text x="680" y="353" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">with a reason</text><rect x="50" y="300" width="470" height="70" rx="10" fill="#f6e2de" stroke="#b3402f" stroke-width="1.5"/><text x="285" y="326" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b3402f" text-anchor="middle" font-weight="bold">Watch out: verbosity bias, position bias,</text><text x="285" y="350" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b3402f" text-anchor="middle" font-weight="bold">self-preference, and non-determinism</text></svg>