<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="420" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Tool-call accuracy (strict) vs tool-call F1 (partial credit)</text><rect x="60" y="110" width="300" height="150" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="210" y="134" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Expected tool calls</text><text x="210" y="164" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">get_metal_price(gold, USD)</text><text x="210" y="186" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">get_metal_price(silver, USD)</text><rect x="460" y="110" width="300" height="150" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="610" y="134" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#b5651d" text-anchor="middle" font-weight="bold">Actual tool calls</text><text x="610" y="160" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1f2933" text-anchor="middle" font-weight="normal">get_metal_price(gold, USD)</text><text x="610" y="182" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1f2933" text-anchor="middle" font-weight="normal">get_metal_price(silver, USD)</text><text x="610" y="204" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#1f2933" text-anchor="middle" font-weight="normal">get_metal_price(platinum, USD)</text><text x="610" y="238" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#b3402f" text-anchor="middle" font-weight="normal" font-style="italic">the third call is extra</text><rect x="60" y="290" width="340" height="110" rx="10" fill="#ffffff" stroke="#37474f" stroke-width="1.5"/><text x="230" y="314" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">Tool-call ACCURACY (strict)</text><text x="230" y="340" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">right tools, right args, right order</text><text x="230" y="358" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">one extra or wrong order can zero it</text><text x="230" y="392" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b3402f" text-anchor="middle" font-weight="bold">all-or-nothing gate</text><rect x="420" y="290" width="340" height="110" rx="10" fill="#ffffff" stroke="#b8860b" stroke-width="1.5"/><text x="590" y="314" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#b8860b" text-anchor="middle" font-weight="bold">Tool-call F1 (partial credit)</text><text x="590" y="340" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">TP=2, FP=1, FN=0  ->  P=0.67, R=1.0</text><text x="590" y="358" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">ignores order; rewards being close</text><text x="590" y="392" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#2e7d52" text-anchor="middle" font-weight="bold">F1 = 0.80</text></svg>