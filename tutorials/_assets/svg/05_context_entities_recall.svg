<svg viewBox="0 0 820 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="420" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Context entities recall: coverage of the key named facts</text><text x="410" y="80" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b6470" text-anchor="middle" font-weight="normal">Of the named entities the answer needs, how many did retrieval cover?</text><rect x="70" y="120" width="300" height="150" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="220" y="144" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#b5651d" text-anchor="middle" font-weight="bold">Reference entities (RE)</text><text x="220" y="176" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">South Africa</text><text x="220" y="194" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">Russia</text><text x="220" y="212" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">platinum</text><text x="220" y="230" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">palladium</text><text x="220" y="248" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">1956</text><rect x="450" y="120" width="300" height="150" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="600" y="144" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Retrieved-context entities</text><text x="600" y="176" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">South Africa</text><text x="600" y="194" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">Russia</text><text x="600" y="212" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">platinum</text><text x="600" y="230" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">palladium</text><line x1="370" y1="180" x2="450" y2="180" stroke="#2e7d52" stroke-width="2.5"/><text x="410" y="170" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#2e7d52" text-anchor="middle" font-weight="normal">overlap</text><rect x="150" y="300" width="520" height="90" rx="10" fill="#ffffff" stroke="#b8860b" stroke-width="1.5"/><text x="410" y="330" font-family="Helvetica,Arial,sans-serif" font-size="15" fill="#1f2933" text-anchor="middle" font-weight="bold">Context Entity Recall = |overlap| / |RE|  =  4 / 5  =  0.80</text><text x="410" y="360" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">good for fact-heavy answers (places, names, dates)</text></svg>