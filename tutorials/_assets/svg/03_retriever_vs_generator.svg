<svg viewBox="0 0 820 440" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="440" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Two halves, two failure modes: where each metric looks</text><rect x="20" y="170" width="110" height="70" rx="10" fill="#eceff1" stroke="#37474f" stroke-width="1.5"/><text x="75" y="210" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#37474f" text-anchor="middle" font-weight="bold">Question</text><line x1="130" y1="205" x2="180" y2="205" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="180" y="160" width="180" height="90" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="270" y="193" font-family="Helvetica,Arial,sans-serif" font-size="15" fill="#2f6f7f" text-anchor="middle" font-weight="bold">RETRIEVER</text><text x="270" y="216" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">find relevant text</text><line x1="360" y1="205" x2="420" y2="205" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="390" y="196" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6470" text-anchor="middle" font-weight="normal">contexts</text><rect x="420" y="160" width="180" height="90" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="510" y="193" font-family="Helvetica,Arial,sans-serif" font-size="15" fill="#b5651d" text-anchor="middle" font-weight="bold">GENERATOR</text><text x="510" y="216" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">write the answer</text><line x1="600" y1="205" x2="660" y2="205" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><rect x="660" y="170" width="120" height="70" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="720" y="210" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#2e7d52" text-anchor="middle" font-weight="bold">Answer</text><rect x="150" y="290" width="240" height="120" rx="10" fill="#ffffff" stroke="#2f6f7f" stroke-width="1.5" stroke-dasharray="4 3"/><text x="270" y="314" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Retriever metrics</text><text x="270" y="338" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">context precision</text><text x="270" y="356" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">context recall</text><text x="270" y="374" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">context entities recall</text><text x="270" y="392" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">noise sensitivity (lower better)</text><line x1="270" y1="250" x2="270" y2="290" stroke="#2f6f7f" stroke-width="1.5" stroke-dasharray="3 3"/><rect x="420" y="290" width="240" height="120" rx="10" fill="#ffffff" stroke="#b5651d" stroke-width="1.5" stroke-dasharray="4 3"/><text x="540" y="314" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#b5651d" text-anchor="middle" font-weight="bold">Generator metrics</text><text x="540" y="338" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">faithfulness</text><text x="540" y="356" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">response relevancy</text><text x="540" y="374" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="middle" font-weight="normal">factual correctness</text><line x1="510" y1="250" x2="510" y2="290" stroke="#b5651d" stroke-width="1.5" stroke-dasharray="3 3"/></svg>