<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="400" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Faithfulness: is every claim backed by the retrieved context?</text><rect x="60" y="110" width="260" height="90" rx="10" fill="#f7ebdd" stroke="#b5651d" stroke-width="1.5"/><text x="190" y="140" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#b5651d" text-anchor="middle" font-weight="bold">Answer</text><text x="190" y="165" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">broken into</text><text x="190" y="182" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="middle" font-weight="normal">atomic claims</text><line x1="320" y1="155" x2="390" y2="155" stroke="#9aa3ad" stroke-width="2" marker-end="url(#arr)"/><text x="355" y="146" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#5b6470" text-anchor="middle" font-weight="normal">check</text><rect x="390" y="90" width="360" height="150" rx="10" fill="#e3eef0" stroke="#2f6f7f" stroke-width="1.5"/><text x="570" y="114" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2f6f7f" text-anchor="middle" font-weight="bold">Retrieved context</text><text x="420" y="142" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="start" font-weight="normal">claim A  ->  supported  (yes)</text><text x="420" y="166" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="start" font-weight="normal">claim B  ->  supported  (yes)</text><text x="420" y="190" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#1f2933" text-anchor="start" font-weight="normal">claim C  ->  NOT in context  (no)</text><rect x="200" y="280" width="420" height="80" rx="10" fill="#ffffff" stroke="#b8860b" stroke-width="1.5"/><text x="410" y="310" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#1f2933" text-anchor="middle" font-weight="bold">Faithfulness = supported claims / all claims = 2 / 3 = 0.67</text><text x="410" y="340" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#5b6470" text-anchor="middle" font-weight="normal">measures grounding in context, NOT truth</text></svg>