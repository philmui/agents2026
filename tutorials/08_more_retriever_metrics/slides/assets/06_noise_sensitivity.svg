<svg viewBox="0 0 820 330" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif"><defs><marker id="arr" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#9aa3ad"/></marker></defs><rect x="0" y="0" width="820" height="330" rx="16" fill="#faf8f3" stroke="#e6e1d6" stroke-width="1"/><text x="410.0" y="38" font-family="Helvetica,Arial,sans-serif" font-size="20" fill="#1f2933" text-anchor="middle" font-weight="bold">Noise sensitivity: how often noise leads the answer into errors</text><text x="410" y="78" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#5b6470" text-anchor="middle" font-weight="normal">Each claim in the answer is checked: is it correct and well supported?</text><rect x="120" y="120" width="400" height="55" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="150" y="144" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2e7d52" text-anchor="start" font-weight="bold">claim 1</text><text x="150" y="164" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="start" font-weight="normal">supported by relevant context</text><text x="500" y="153" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#2e7d52" text-anchor="end" font-weight="bold">correct</text><rect x="120" y="190" width="400" height="55" rx="10" fill="#e3f0e9" stroke="#2e7d52" stroke-width="1.5"/><text x="150" y="214" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#2e7d52" text-anchor="start" font-weight="bold">claim 2</text><text x="150" y="234" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="start" font-weight="normal">supported by relevant context</text><text x="500" y="223" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#2e7d52" text-anchor="end" font-weight="bold">correct</text><rect x="120" y="260" width="400" height="55" rx="10" fill="#f6e2de" stroke="#b3402f" stroke-width="1.5"/><text x="150" y="284" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#b3402f" text-anchor="start" font-weight="bold">claim 3</text><text x="150" y="304" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#5b6470" text-anchor="start" font-weight="normal">pulled from irrelevant context</text><text x="500" y="293" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b3402f" text-anchor="end" font-weight="bold">INCORRECT</text><rect x="560" y="140" width="210" height="160" rx="10" fill="#ffffff" stroke="#37474f" stroke-width="1.5"/><text x="665" y="170" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#37474f" text-anchor="middle" font-weight="bold">Noise sensitivity</text><text x="665" y="210" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="#1f2933" text-anchor="middle" font-weight="normal">= incorrect / total</text><text x="665" y="238" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="#1f2933" text-anchor="middle" font-weight="bold">= 1 / 3 = 0.33</text><text x="665" y="276" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="#b3402f" text-anchor="middle" font-weight="bold">LOWER is better</text></svg>